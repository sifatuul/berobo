<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>চলনা!</title>
    <style>
        /* Pinkish Theme and Reset */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Prevents scrollbars when the button jumps */
        }

        /* Center Box */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(255, 105, 135, 0.2);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            max-width: 90%;
        }

        h1 {
            color: #ff4757;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(255, 71, 87, 0.1);
        }

        /* Button Styling */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
        }

        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #btn-yes {
            background-color: #ff4757;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }

        #btn-yes:hover {
            transform: scale(1.1);
            background-color: #ff6b81;
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.6);
        }

        #btn-no {
            background-color: #ffffff;
            color: #ff4757;
            border: 2px solid #ff4757;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            /* Transition makes the jumping smooth */
            transition: left 0.3s ease, top 0.3s ease; 
        }

        /* Success Message Container */
        .success-message {
            display: none;
            animation: fadeIn 1s ease-in;
        }

        .success-message h2 {
            color: #ff4757;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .success-message p {
            color: #ff6b81;
            font-size: 1.2rem;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="question">Ajke sondhai berobo? 🥺</h1>
        
        <div class="buttons" id="button-container">
            <button id="btn-yes">Ha</button>
            <button id="btn-no">Na</button>
        </div>

        <div class="success-message" id="success-message">
            <h2>Yayyy! ❤️🎉</h2>
            <p>Done! Get ready by evening. See you!</p>
        </div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        const question = document.getElementById('question');
        const buttonContainer = document.getElementById('button-container');
        const successMessage = document.getElementById('success-message');

        // Function to make the "Na" button run away
        const moveButton = () => {
            // Change position to fixed so it can go anywhere on the screen
            btnNo.style.position = 'fixed';
            
            // Calculate max X and Y so the button doesn't go off-screen
            const maxX = window.innerWidth - btnNo.offsetWidth - 20;
            const maxY = window.innerHeight - btnNo.offsetHeight - 20;
            
            // Generate random coordinates
            const randomX = Math.floor(Math.random() * maxX) + 10;
            const randomY = Math.floor(Math.random() * maxY) + 10;
            
            // Apply new coordinates
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        };

        // Trigger movement when mouse hovers over it (for computer/laptop)
        btnNo.addEventListener('mouseover', moveButton);
        
        // Trigger movement when touched (for smartphones)
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents clicking it accidentally on mobile
            moveButton();
        });

        // What happens when she finally clicks "Ha"
        btnYes.addEventListener('click', () => {
            question.style.display = 'none';
            buttonContainer.style.display = 'none';
            successMessage.style.display = 'block';
            
            // Optional: Remove the "Na" button completely so it stops flying around
            btnNo.style.display = 'none';
        });
    </script>
</body>
</html>
