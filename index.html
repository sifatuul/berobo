<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You</title>
    <style>
        /* Import a pretty font */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #ffb6c1, #ffe4e1, #ffc0cb, #fff0f5);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Flowers Container */
        .flowers-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .flower {
            position: absolute;
            font-size: 1.5rem;
            color: rgba(255, 182, 193, 0.7);
            animation: floatUp linear infinite;
            bottom: -50px;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg) scale(1.5); opacity: 0; }
        }

        /* Main Glass Card */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.45);
            padding: 40px 20px;
            border-radius: 25px;
            box-shadow: 0 8px 32px rgba(255, 105, 135, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #d87093;
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            text-shadow: 1px 1px 2px rgba(216, 112, 147, 0.1);
            line-height: 1.3;
        }

        /* Buttons Container */
        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 100%;
            height: 60px;
        }

        button {
            padding: 12px 30px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            width: 120px;
            z-index: 20;
        }

        /* The 'Ha' Button */
        #btn-yes {
            background: linear-gradient(45deg, #ff69b4, #ff85c0);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
            transition: all 0.2s ease;
        }

        #btn-yes:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.6);
        }

        #btn-yes:active {
            transform: scale(0.95);
        }

        /* The 'Na' Button */
        #btn-no {
            background: white;
            color: #ff69b4;
            border: 2px solid #ff69b4;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            /* Smooth slide transition for the dodge effect */
            transition: transform 0.2s ease-out; 
        }

        /* Success Message Container */
        .success-message {
            display: none;
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        .success-message h2 {
            color: #d87093;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .success-message p {
            color: #d87093;
            font-size: 1.1rem;
            font-weight: 600;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Floating Background Flowers -->
    <div class="flowers-bg" id="flowers-bg"></div>

    <div class="container">
        <h1 id="question">Ajke sondhai berobo?</h1>
        
        <div class="buttons" id="button-container">
            <button id="btn-yes">Ha</button>
            <button id="btn-no">Na</button>
        </div>

        <div class="success-message" id="success-message">
            <h2>Yayyy!</h2>
            <p>Done! Get ready by evening.</p>
            <p>See you!</p>
        </div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        const question = document.getElementById('question');
        const buttonContainer = document.getElementById('button-container');
        const successMessage = document.getElementById('success-message');
        const flowersBg = document.getElementById('flowers-bg');

        // Create random floating flowers
        function createFlowers() {
            const flowerArray = ['🌸', '🌼', '🌻', '🌺', '🌹', '🌷'];
            for (let i = 0; i < 15; i++) {
                let flower = document.createElement('div');
                flower.className = 'flower';
                flower.innerText = flowerArray[Math.floor(Math.random() * flowerArray.length)];
                flower.style.left = Math.random() * 100 + 'vw';
                flower.style.animationDuration = (Math.random() * 3 + 4) + 's';
                flower.style.animationDelay = Math.random() * 5 + 's';
                flowersBg.appendChild(flower);
            }
        }
        createFlowers();

        // Variables to keep track of current movement position
        let currentTransformX = 0;
        let currentTransformY = 0;

        // Function to make the "Na" button dodge slightly
        const moveButton = () => {
            const viewportWidth = document.documentElement.clientWidth;
            const viewportHeight = document.documentElement.clientHeight;
            const btnRect = btnNo.getBoundingClientRect();
            
            // Calculate original position (without previous transforms)
            const originalLeft = btnRect.left - currentTransformX;
            const originalTop = btnRect.top - currentTransformY;

            // Generate a small jump: between -80px and +80px
            let jumpX = (Math.random() * 160) - 80;
            let jumpY = (Math.random() * 160) - 80;

            // Make sure the jump is at least 40px away so it actually escapes her finger
            if (Math.abs(jumpX) < 40) jumpX = jumpX < 0 ? -50 : 50;
            if (Math.abs(jumpY) < 40) jumpY = jumpY < 0 ? -50 : 50;

            let nextX = currentTransformX + jumpX;
            let nextY = currentTransformY + jumpY;

            // Screen boundaries padding
            const safePadding = 20;

            // Stop it from going off the left/right screen edges
            if (originalLeft + nextX < safePadding) {
                nextX = safePadding - originalLeft; 
            } else if (originalLeft + nextX + btnRect.width > viewportWidth - safePadding) {
                nextX = viewportWidth - btnRect.width - safePadding - originalLeft;
            }

            // Stop it from going off the top/bottom screen edges
            if (originalTop + nextY < safePadding) {
                nextY = safePadding - originalTop;
            } else if (originalTop + nextY + btnRect.height > viewportHeight - safePadding) {
                nextY = viewportHeight - btnRect.height - safePadding - originalTop;
            }

            // Update transform variables
            currentTransformX = nextX;
            currentTransformY = nextY;
            
            // Move it smoothly via CSS transform
            btnNo.style.transform = `translate(${currentTransformX}px, ${currentTransformY}px)`;
        };

        // For PC/Laptop (Mouse hover)
        btnNo.addEventListener('mouseover', moveButton);
        
        // For Mobile/Phone (Touch screen)
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents accidental click registering
            moveButton();
        });

        // What happens when she finally clicks "Ha"
        btnYes.addEventListener('click', () => {
            question.style.display = 'none';
            buttonContainer.style.display = 'none';
            btnNo.style.display = 'none';
            successMessage.style.display = 'block';
        });
    </script>
</body>
</html>
